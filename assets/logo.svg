    <!-- Cables -->
    <line x1="6.5" y1="13" x2="10" y2="8" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <line x1="21.5" y1="13" x2="18" y2="8" stroke="#fff" stroke-width="1" opacity="0.6"/>
    <!-- Bolt -->
    <path d="M14 17 L12 13 L16 13 L13 9" stroke="#ffe066" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  <!-- Text -->
  <text x="42" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="22" fill="#222222">TokenBridge</text>
