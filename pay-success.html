<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenBridge 支付成功</title>
<link rel="icon" href="assets/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
    background: #f0fdf4;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: #ffffff; border-radius: 20px; padding: 48px 40px;
    max-width: 480px; width: 100%; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .icon { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 28px; font-weight: 700; color: #166534; margin-bottom: 8px; }
  p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .key-box {
    background: #f8fafc; border: 2px dashed #bbf7d0; border-radius: 12px;
    padding: 16px; margin: 16px 0; word-break: break-all;
    font-family: 'Consolas', monospace; font-size: 14px; color: #166534;
  }
  .key-label { font-size: 12px; color: #999; margin-bottom: 6px; }
  .btn {
    display: inline-block; padding: 14px 32px; border-radius: 10px;
    background: #22c55e; color: #fff; font-size: 16px; font-weight: 600;
    text-decoration: none; margin-top: 8px; transition: background 0.2s;
  }
  .btn:hover { background: #16a34a; }
  .note { font-size: 13px; color: #aaa; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>支付成功！</h1>
  <p>你的 TokenBridge API Key 已经准备好了。</p>
  <div class="key-label">你的 API Key</div>
  <div class="key-box" id="keyDisplay">加载中...</div>
  <button onclick="copyKey()" style="display:inline-block;padding:10px 24px;border-radius:8px;background:#e8f5e9;color:#166534;border:1px solid #bbf7d0;font-size:14px;cursor:pointer;margin-top:4px;transition:0.2s;" onmouseover="this.style.background='#c8e6c9'" onmouseout="this.style.background='#e8f5e9'">📋 复制 Key</button>
  <a href="/" class="btn">返回首页</a>
  <div class="note">API Key 也已发送到你的邮箱，可在用量页用邮箱找回</div>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key') || '请查看邮箱';
  const plan = params.get('plan') || '';
  document.getElementById('keyDisplay').textContent = key;
  if (plan) {
    const names = {'pro-flash':'Pro Flash','team-flash':'Team Flash','pro-pro':'Pro Pro','topup-10':'10M充值包','topup-50':'50M充值包','topup-100':'100M充值包'};
    document.querySelector('p').textContent = '你的 TokenBridge ' + (names[plan] || plan) + ' 已激活。';
  }
})();
function copyKey() {
  const key = document.getElementById('keyDisplay').textContent;
  if (!key || key === '加载中...' || key === '请查看邮箱') return;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.querySelector('button[onclick="copyKey()"]');
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制 Key'; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea'); ta.value = key; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    const btn = document.querySelector('button[onclick="copyKey()"]');
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制 Key'; }, 2000);
  });
}
</script>
</body>
</html>
